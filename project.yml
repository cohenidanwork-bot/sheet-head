name: ShitHead
options:
  bundleIdPrefix: com.idancoh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ShitHead:
    type: application
    platform: iOS
    sources:
      - path: ShitHead
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.idancoh.shithead
        INFOPLIST_FILE: ShitHead/Info.plist
  ShitHeadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ShitHeadTests
    dependencies:
      - target: ShitHead
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.idancoh.shithead.tests
